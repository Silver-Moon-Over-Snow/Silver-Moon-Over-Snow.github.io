<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>第九章 张量 · 高等代数知识库</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>">
<style>
:root{--bg:#f4f7f2;--panel:#fff;--ink:#1f2a2e;--muted:#647277;--line:#dbe2dc;--brand:#2f6f63;--brand-dark:#204a42;--brand-2:#a65f3b;--brand-rgb:47,111,99;--brand-2-rgb:166,95,59;--soft:#edf4ef;--cream:#fff8eb;--wrong:#c74d47;--right:#2f7d52;--shadow:0 18px 40px rgba(35,48,45,.11);--shadow-soft:0 8px 22px rgba(35,48,45,.07);--radius:8px}
body.dark{--bg:#1e1e1e;--panel:#252526;--ink:#e6e6e6;--muted:#a9b0b3;--line:#3b3f42;--brand:#6cc3a2;--brand-dark:#8ed8c1;--brand-2:#d7a875;--brand-rgb:108,195,162;--brand-2-rgb:215,168,117;--soft:#303735;--cream:#2b2925;--shadow:0 14px 34px rgba(0,0,0,.30);--shadow-soft:0 8px 22px rgba(0,0,0,.22)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.72;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg),transparent 8%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-inner{max-width:960px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;min-height:56px;gap:12px;flex-wrap:wrap}
.topbar a{color:var(--brand);text-decoration:none;font-weight:600;font-size:15px}
.topbar a:hover{color:var(--brand-dark)}
.topbar .t{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--ink)}
.theme-btn{padding:6px 14px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px}
.theme-btn:hover{color:var(--brand);border-color:var(--brand)}
.wrap{max-width:920px;margin:0 auto;padding:32px 20px 80px}
.page-header{margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.page-header h1{font-family:'Noto Serif SC',serif;font-size:clamp(26px,5vw,38px);color:var(--brand);margin-bottom:6px}
.page-header .meta{color:var(--muted);font-size:13px}
.toc{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:18px 22px;margin-bottom:28px;box-shadow:var(--shadow-soft)}
.toc h2{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--ink);margin-bottom:8px}
.toc ol{list-style:none;counter-reset:t}
.toc li{counter-increment:t;margin-bottom:3px}
.toc a{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;padding:3px 8px;border-radius:4px}
.toc a::before{content:counter(t)".";color:var(--muted);font-size:12px;min-width:1.6em}
.toc a:hover{color:var(--brand);background:var(--soft)}
.sec{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-soft)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--soft);gap:10px;flex-wrap:wrap}
.sec-hd h2{font-family:'Noto Serif SC',serif;font-size:17px;color:var(--ink);flex:1;min-width:0}
.sec-tools{display:flex;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;min-height:30px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap}
.btn:hover{color:var(--brand);border-color:var(--brand);background:var(--soft)}
.btn.copied{color:var(--right);border-color:var(--right);background:#eaf7ef}
body.dark .btn.copied{background:#1a3a2a}
.btn svg{width:13px;height:13px}
.sec-body{padding:20px 24px}
.sec-body h3{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--ink);margin:16px 0 6px}
.sec-body p{color:var(--muted);font-size:14px;line-height:1.78;margin:8px 0}
.sec-body strong{color:var(--ink)}
.sec-body blockquote{border-left:3px solid var(--brand);padding:6px 14px;margin:10px 0;color:var(--muted);font-size:13px;background:var(--soft);border-radius:0 5px 5px 0}
.sec-body code{padding:2px 6px;border-radius:4px;background:var(--soft);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:.9em;color:var(--brand-dark)}
.sec-body pre{overflow-x:auto;margin:12px 0;padding:14px 16px;border-radius:6px;background:#1e1e1e;color:#e6e6e6;font-size:13px;line-height:1.6}
body.dark .sec-body pre{background:#0d0d0d}
.sec-body pre code{background:transparent;color:inherit;padding:0}
.sec-body .math-block{overflow-x:auto;margin:14px 0;padding:6px 0}
.sec-body ul,.sec-body ol{color:var(--muted);font-size:14px;line-height:1.78;margin:8px 0 8px 1.5em}
.sec-body sup{color:var(--brand);font-size:.8em}
.sec-body sub{font-size:.85em}
.cmt{border-top:1px solid var(--line);max-height:0;overflow:hidden;padding:0 20px;transition:max-height .3s,padding .3s}
.cmt.open{max-height:700px;padding:14px 20px}
.cmt-list{margin-bottom:10px}
.cmt-item{padding:10px 14px;border:1px solid var(--line);border-radius:6px;background:var(--soft);margin-bottom:6px;font-size:13px;color:var(--muted);position:relative}
.cmt-time{font-size:11px;color:var(--muted);margin-bottom:3px;opacity:.7}
.cmt-del{position:absolute;top:6px;right:8px;width:22px;height:22px;display:grid;place-items:center;border:none;border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
.cmt-del:hover{color:var(--wrong);background:rgba(199,77,71,.08)}
.cmt-input-wrap{display:flex;gap:6px}
.cmt-input{flex:1;min-height:34px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);font-size:13px;font-family:inherit;resize:vertical}
.cmt-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.12)}
.cmt-submit{min-height:34px;padding:0 14px;border:none;border-radius:6px;background:var(--brand);color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.cmt-submit:hover{opacity:.85}
.intro-card{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(135deg,rgba(var(--brand-rgb),.08),rgba(var(--brand-2-rgb),.04)),var(--panel);box-shadow:var(--shadow-soft);padding:22px 24px;margin-bottom:16px}
.intro-card p{color:var(--muted);font-size:14px;line-height:1.78;margin:8px 0}
@media(max-width:640px){.sec-hd{padding:12px 14px}.sec-body{padding:14px 16px}.cmt.open{padding:10px 14px}.sec-tools{width:100%}.btn{flex:1;justify-content:center}}
</style>
